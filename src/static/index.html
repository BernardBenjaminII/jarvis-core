<!DOCTYPE html>
<html>
<head>
    <title>JARVIS</title>

    <style>
        body {
            margin: 0;
            font-family: "Segoe UI", sans-serif;
            background: #0a0f1c;
            color: #00ffe1;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* WATERMARK */
        body::before {
            content: "";
            position: fixed;
            top: 50%;
            left: 50%;
            width: 700px;
            height: 700px;
            background: url("/static/assets/jarvis-avatar.png") no-repeat center;
            background-size: contain;
            opacity: 0.25;
            filter: brightness(1.5) contrast(1.2);
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 0;
        }

        h1 {
            margin-top: 20px;
            text-shadow: 0 0 10px #00ffe1;
            z-index: 1;
        }

        #chat {
            width: 90%;
            max-width: 800px;
            height: 500px;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid #00ffe1;
            box-shadow: 0 0 20px #00ffe1;
            overflow-y: auto;
            padding: 15px;
            margin: 20px 0;
            z-index: 1;
        }

        .message {
            margin: 10px 0;
            padding: 10px;
            border-radius: 8px;
        }

        .user {
            text-align: right;
            color: #00bfff;
        }

        .jarvis {
            text-align: left;
            color: #00ffe1;
        }

        #input-area {
            display: flex;
            width: 90%;
            max-width: 800px;
            z-index: 1;
            gap: 10px;
        }

        input, select {
            padding: 12px;
            background: black;
            border: 1px solid #00ffe1;
            color: #00ffe1;
            outline: none;
        }

        input {
            flex: 1;
        }

        button {
            padding: 12px 20px;
            background: #00ffe1;
            color: black;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background: #00bfa5;
        }
    </style>
</head>

<body>

<h1>JARVIS SYSTEM</h1>

<div id="chat"></div>

<div id="input-area">
    <input id="question" placeholder="Enter command..." />

    <select id="mode">
        <option value="auto">🤖 Auto</option>
        <option value="low">⚡ Low</option>
        <option value="medium">⚖️ Medium</option>
        <option value="high">🔥 High</option>
        <option value="cloud">☁️ Cloud</option>
    </select>

    <button onclick="ask()">Send</button>
</div>

<script>
async function ask() {
    const input = document.getElementById("question");
    const mode = document.getElementById("mode").value;
    const chat = document.getElementById("chat");

    const question = input.value.trim();
    if (!question) return;

    chat.innerHTML += `<div class="message user">YOU: ${escapeHtml(question)}</div>`;
    input.value = "";

    const res = await fetch("/ask", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            question: question,
            mode: mode
        })
    });

    const data = await res.json();

    typeWriter(`JARVIS: ${data.response}`, chat);
}

function typeWriter(text, container) {
    let i = 0;
    const div = document.createElement("div");
    div.className = "message jarvis";
    container.appendChild(div);

    function typing() {
        if (i < text.length) {
            div.innerHTML += text.charAt(i);
            i++;
            container.scrollTop = container.scrollHeight;
            setTimeout(typing, 8);
        }
    }

    typing();
}

// Enter key support
document.getElementById("question").addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
        ask();
    }
});

// Basic HTML escape (prevents UI break)
function escapeHtml(text) {
    return text.replace(/[&<>"']/g, function(m) {
        return {
            '&': '&amp;',
            '<': '&lt;',
            '>': '&gt;',
            '"': '&quot;',
            "'": '&#039;'
        }[m];
    });
}
</script>

</body>
</html>
